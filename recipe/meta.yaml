{% set version = "0.9.2" %}

package:
  name: climlab
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/climlab/climlab-{{ version }}.tar.gz
  sha256: 8dfa7aab647bd0f9c95a11d0e1ccb598b6fc0122bfe2e29a00af704a708363fb

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - pooch
    - xarray
    - numpy
    - scipy >=1.6
    - climlab-rrtmg >=0.4.1
    - climlab-emanuel-convection
    - climlab-cam3-radiation >0.2
    - climlab-sbm-convection
    - six

test:
  requires:
    - pytest
    - python {{ python_min }}
  imports:
    - climlab
  commands:
    - pytest -v -m fast --pyargs climlab

about:
  home: https://github.com/climlab/climlab
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python package for process-oriented climate modeling
  doc_url: http://climlab.readthedocs.io/
  dev_url: https://github.com/climlab/climlab

extra:
  recipe-maintainers:
    - brian-rose
    - jhkennedy
